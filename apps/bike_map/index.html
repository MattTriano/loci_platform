<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chicago Bike Map</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.20.0/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl@5.20.0/dist/maplibre-gl.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0a0a0a;
    color: #e8e4df;
  }

  #map {
    position: absolute;
    inset: 0;
  }

  /* ── Layer control panel ─────────────────────────────── */
  #controls {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 10;
    background: rgba(18, 18, 20, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 16px 18px;
    min-width: 210px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  #controls h2 {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 12px;
  }

  .layer-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s;
  }

  .layer-toggle:hover { opacity: 0.85; }

  .layer-toggle input[type="checkbox"] {
    appearance: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.25);
    border-radius: 4px;
    flex-shrink: 0;
    position: relative;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .layer-toggle input[type="checkbox"]:checked {
    border-color: var(--layer-color);
    background: var(--layer-color);
  }

  .layer-toggle input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    top: 1px;
    left: 4px;
    width: 4px;
    height: 8px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .layer-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .layer-label {
    font-size: 14px;
    font-weight: 500;
    color: #e8e4df;
  }

  .layer-count {
    margin-left: auto;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.35);
    font-variant-numeric: tabular-nums;
  }

  /* ── Popup styling ───────────────────────────────────── */
  .maplibregl-popup-content {
    font-family: 'DM Sans', sans-serif;
    background: rgba(22, 22, 26, 0.96);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    padding: 14px 16px;
    color: #e8e4df;
    max-width: 300px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  }

  .maplibregl-popup-close-button {
    color: rgba(255, 255, 255, 0.5);
    font-size: 18px;
    right: 6px;
    top: 4px;
  }

  .maplibregl-popup-close-button:hover { color: #fff; }
  .maplibregl-popup-tip { border-top-color: rgba(22, 22, 26, 0.96); }

  .popup-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .popup-nav-btn {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 4px;
    color: rgba(255, 255, 255, 0.7);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    padding: 2px 8px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .popup-nav-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }
  .popup-nav-btn:disabled { opacity: 0.25; cursor: default; }

  .popup-nav-counter {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.4);
    font-variant-numeric: tabular-nums;
  }

  .popup-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .popup-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 3px 0;
    font-size: 13px;
    line-height: 1.4;
  }

  .popup-key {
    color: rgba(255, 255, 255, 0.45);
    flex-shrink: 0;
  }

  .popup-val {
    text-align: right;
    font-weight: 500;
    word-break: break-word;
  }

  /* ── Loading indicator ───────────────────────────────── */
  .loading-bar {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(18, 18, 20, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.6);
    transition: opacity 0.3s;
  }

  .loading-bar.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="map"></div>

<div id="controls">
  <h2>Layers</h2>
</div>

<div id="loading" class="loading-bar hidden">Loading…</div>

<script>
// ── Layer configuration ──────────────────────────────────
// Each layer defines how to load, style, cluster, and display popups.
// To add a new layer, just add an entry here.
const LAYERS = {
  crashes: {
    label: 'Bike Crashes',
    color: '#ef4444',
    file: 'data/crashes.geojson',
    clusterMaxZoom: 13,
    clusterRadius: 45,
    pointRadius: 5,
    defaultVisible: true,
    popupTitle: 'Bike Crash',
    popupFields: [
      { key: 'crash_date',              label: 'Date' },
      { key: 'local_crash_time',        label: 'Time' },
      { key: 'local_crash_day_of_week', label: 'Day' },
      { key: 'street_direction',        label: 'Street', fmt: (v, p) => `${v || ''} ${p.street_name || ''}`.trim() },
      { key: 'first_crash_type',        label: 'Type' },
      { key: 'most_severe_injury',      label: 'Worst Injury' },
      { key: 'severity_score',          label: 'Severity' },
      { key: 'prim_contributory_cause', label: 'Cause' },
      { key: 'weather_condition',       label: 'Weather' },
      { key: 'lighting_condition',      label: 'Lighting' },
      { key: 'hit_and_run_i',           label: 'Hit & Run', fmt: v => v === 'Y' ? 'Yes' : v === 'N' ? 'No' : null },
      { key: 'dooring_i',              label: 'Dooring',   fmt: v => v === 'Y' ? 'Yes' : v === 'N' ? 'No' : null },
    ],
  },
  thefts: {
    label: 'Bike Thefts',
    color: '#f59e0b',
    file: 'data/thefts.geojson',
    clusterMaxZoom: 13,
    clusterRadius: 45,
    pointRadius: 5,
    defaultVisible: true,
    popupTitle: 'Bike Theft',
    popupFields: [
      { key: 'source',               label: 'Source' },
      { key: 'theft_date',           label: 'Date' },
      { key: 'theft_hour',           label: 'Hour', fmt: v => v != null ? `${v}:00` : null },
      { key: 'location_description', label: 'Location' },
      { key: 'bike_description',     label: 'Bike' },
      { key: 'theft_description',    label: 'Details' },
      { key: 'locking_description',  label: 'Locking' },
    ],
  },
  parking: {
    label: 'Bike Parking',
    color: '#22c55e',
    file: 'data/parking.geojson',
    clusterMaxZoom: 13,
    clusterRadius: 40,
    pointRadius: 5,
    defaultVisible: true,
    popupTitle: 'Bike Parking',
    popupFields: [
      { key: 'name',     label: 'Name' },
      { key: 'type',     label: 'Type' },
      { key: 'capacity', label: 'Capacity' },
      { key: 'covered',  label: 'Covered',  fmt: v => v === true || v === 'yes' ? 'Yes' : v === false || v === 'no' ? 'No' : null },
      { key: 'indoor',   label: 'Indoor',   fmt: v => v === true || v === 'yes' ? 'Yes' : v === false || v === 'no' ? 'No' : null },
      { key: 'lit',      label: 'Lit',      fmt: v => v === true || v === 'yes' ? 'Yes' : v === false || v === 'no' ? 'No' : null },
      { key: 'fee',      label: 'Fee',      fmt: v => v === true || v === 'yes' ? 'Yes' : v === false || v === 'no' ? 'No' : null },
      { key: 'operator', label: 'Operator' },
      { key: 'access',   label: 'Access' },
    ],
  },
};

// ── State ────────────────────────────────────────────────
const layerData = {};   // layerId -> GeoJSON FeatureCollection
const layerCounts = {}; // layerId -> feature count
let currentPopup = null;
let popupFeatures = []; // [{cfg, props, coords}] for all overlapping features
let popupIndex = 0;     // current index in popupFeatures

// ── Map ──────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  center: [-87.6298, 41.8781],
  zoom: 11,
  minZoom: 9,
  maxZoom: 19,
  attributionControl: true,
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');
map.addControl(new maplibregl.GeolocateControl({
  positionOptions: { enableHighAccuracy: true },
  trackUserLocation: true,
}), 'top-right');

// ── Build control panel ──────────────────────────────────
const controlsEl = document.getElementById('controls');

for (const [id, cfg] of Object.entries(LAYERS)) {
  const label = document.createElement('label');
  label.className = 'layer-toggle';
  label.style.setProperty('--layer-color', cfg.color);
  label.innerHTML = `
    <input type="checkbox" ${cfg.defaultVisible ? 'checked' : ''} data-layer="${id}" />
    <span class="layer-swatch" style="background:${cfg.color}"></span>
    <span class="layer-label">${cfg.label}</span>
    <span class="layer-count" id="count-${id}"></span>
  `;
  controlsEl.appendChild(label);

  label.querySelector('input').addEventListener('change', (e) => {
    toggleLayer(id, e.target.checked);
  });
}

// ── Map load ─────────────────────────────────────────────
map.on('load', () => {
  for (const [id, cfg] of Object.entries(LAYERS)) {
    if (cfg.defaultVisible) {
      loadLayer(id);
    }
  }
});

// ── Layer loading ────────────────────────────────────────
async function loadLayer(id) {
  if (layerData[id]) {
    showLayer(id);
    return;
  }

  const cfg = LAYERS[id];
  const loadingEl = document.getElementById('loading');
  loadingEl.textContent = `Loading ${cfg.label}…`;
  loadingEl.classList.remove('hidden');

  try {
    const resp = await fetch(cfg.file);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const geojson = await resp.json();
    layerData[id] = geojson;
    layerCounts[id] = geojson.features ? geojson.features.length : 0;

    const countEl = document.getElementById(`count-${id}`);
    if (countEl) countEl.textContent = layerCounts[id].toLocaleString();

    addLayerToMap(id);
  } catch (err) {
    console.error(`Failed to load ${cfg.file}:`, err);
    loadingEl.textContent = `Failed to load ${cfg.label}`;
    setTimeout(() => loadingEl.classList.add('hidden'), 2000);
    return;
  }

  loadingEl.classList.add('hidden');
}

// ── Add source + layers to the map ───────────────────────
function addLayerToMap(id) {
  const cfg = LAYERS[id];
  const sourceId = `src-${id}`;

  map.addSource(sourceId, {
    type: 'geojson',
    data: layerData[id],
    cluster: true,
    clusterMaxZoom: cfg.clusterMaxZoom,
    clusterRadius: cfg.clusterRadius,
  });

  // Cluster circles
  map.addLayer({
    id: `${id}-clusters`,
    type: 'circle',
    source: sourceId,
    filter: ['has', 'point_count'],
    paint: {
      'circle-color': cfg.color,
      'circle-opacity': 0.75,
      'circle-radius': [
        'step', ['get', 'point_count'],
        14,   // < 10
        10, 18,   // 10–99
        100, 24,  // 100–999
        1000, 32, // 1000+
      ],
    },
  });

  // Cluster count labels
  map.addLayer({
    id: `${id}-cluster-count`,
    type: 'symbol',
    source: sourceId,
    filter: ['has', 'point_count'],
    layout: {
      'text-field': '{point_count_abbreviated}',
      'text-size': 12,
    },
    paint: {
      'text-color': '#ffffff',
    },
  });

  // Individual points
  map.addLayer({
    id: `${id}-points`,
    type: 'circle',
    source: sourceId,
    filter: ['!', ['has', 'point_count']],
    paint: {
      'circle-color': cfg.color,
      'circle-radius': cfg.pointRadius,
      'circle-stroke-width': 1.5,
      'circle-stroke-color': 'rgba(255,255,255,0.6)',
      'circle-opacity': 0.85,
    },
  });

  // Click → zoom into cluster
  map.on('click', `${id}-clusters`, (e) => {
    const features = map.queryRenderedFeatures(e.point, { layers: [`${id}-clusters`] });
    const clusterId = features[0].properties.cluster_id;
    map.getSource(sourceId).getClusterExpansionZoom(clusterId, (err, zoom) => {
      if (err) return;
      map.easeTo({ center: features[0].geometry.coordinates, zoom: zoom });
    });
  });

  // Click → popup on individual point (with pagination for overlapping features)
  map.on('click', `${id}-points`, (e) => {
    // Query ALL visible point layers at this pixel, not just the current layer
    const allPointLayers = Object.keys(LAYERS)
      .map(lid => `${lid}-points`)
      .filter(lid => map.getLayer(lid) && map.getLayoutProperty(lid, 'visibility') !== 'none');

    const allFeatures = map.queryRenderedFeatures(e.point, { layers: allPointLayers });
    if (!allFeatures.length) return;

    // Build the feature list with their layer configs
    popupFeatures = allFeatures.map(feat => {
      // Figure out which layer config this feature belongs to
      const layerId = feat.layer.id.replace('-points', '');
      const featCfg = LAYERS[layerId];
      const coords = feat.geometry.coordinates.slice();
      while (Math.abs(e.lngLat.lng - coords[0]) > 180) {
        coords[0] += e.lngLat.lng > coords[0] ? 360 : -360;
      }
      return { cfg: featCfg, props: feat.properties, coords };
    });
    popupIndex = 0;

    showPopupAtIndex(popupFeatures[0].coords);
  });

  // Cursor styling
  map.on('mouseenter', `${id}-clusters`, () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', `${id}-clusters`, () => { map.getCanvas().style.cursor = ''; });
  map.on('mouseenter', `${id}-points`, () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', `${id}-points`, () => { map.getCanvas().style.cursor = ''; });
}

// ── Popup display with pagination ────────────────────────
function showPopupAtIndex(coords) {
  const entry = popupFeatures[popupIndex];
  const html = buildPopupHTML(entry.cfg, entry.props, popupFeatures.length, popupIndex);

  if (currentPopup) currentPopup.remove();
  currentPopup = new maplibregl.Popup({ offset: 8, maxWidth: '320px' })
    .setLngLat(coords)
    .setHTML(html)
    .addTo(map);

  // Wire up prev/next buttons after the popup DOM is inserted
  const prevBtn = document.getElementById('popup-prev');
  const nextBtn = document.getElementById('popup-next');
  if (prevBtn) prevBtn.addEventListener('click', (evt) => {
    evt.stopPropagation();
    popupIndex = Math.max(0, popupIndex - 1);
    showPopupAtIndex(coords);
  });
  if (nextBtn) nextBtn.addEventListener('click', (evt) => {
    evt.stopPropagation();
    popupIndex = Math.min(popupFeatures.length - 1, popupIndex + 1);
    showPopupAtIndex(coords);
  });
}

// ── Popup HTML builder ───────────────────────────────────
function buildPopupHTML(cfg, props, totalCount, currentIndex) {
  let nav = '';
  if (totalCount > 1) {
    nav = `<div class="popup-nav">
      <button class="popup-nav-btn" id="popup-prev" ${currentIndex === 0 ? 'disabled' : ''}>&lsaquo; Prev</button>
      <span class="popup-nav-counter">${currentIndex + 1} of ${totalCount}</span>
      <button class="popup-nav-btn" id="popup-next" ${currentIndex === totalCount - 1 ? 'disabled' : ''}>Next &rsaquo;</button>
    </div>`;
  }

  let rows = '';
  for (const f of cfg.popupFields) {
    let val;
    if (f.fmt) {
      val = f.fmt(props[f.key], props);
    } else {
      val = props[f.key];
    }
    if (val == null || val === '' || val === 'null') continue;
    rows += `<div class="popup-row"><span class="popup-key">${f.label}</span><span class="popup-val">${escHtml(String(val))}</span></div>`;
  }
  return `${nav}<div class="popup-title" style="color:${cfg.color}">${cfg.popupTitle}</div>${rows}`;
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Toggle visibility ────────────────────────────────────
function toggleLayer(id, visible) {
  if (visible) {
    loadLayer(id);
  } else {
    hideLayer(id);
  }
}

function showLayer(id) {
  const ids = [`${id}-clusters`, `${id}-cluster-count`, `${id}-points`];
  for (const lid of ids) {
    if (map.getLayer(lid)) map.setLayoutProperty(lid, 'visibility', 'visible');
  }
}

function hideLayer(id) {
  const ids = [`${id}-clusters`, `${id}-cluster-count`, `${id}-points`];
  for (const lid of ids) {
    if (map.getLayer(lid)) map.setLayoutProperty(lid, 'visibility', 'none');
  }
  if (currentPopup) { currentPopup.remove(); currentPopup = null; }
}
</script>

</body>
</html>
