<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chicago Bike Map</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.20.0/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl@5.20.0/dist/maplibre-gl.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0a0a0a;
    color: #e8e4df;
  }

  #map {
    position: absolute;
    inset: 0;
  }

  /* ── Shared panel styling ────────────────────────────── */
  .panel {
    position: absolute;
    z-index: 10;
    background: rgba(18, 18, 20, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .panel-header h2 {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.5);
    margin: 0;
  }

  .panel-chevron {
    width: 16px;
    height: 16px;
    color: rgba(255, 255, 255, 0.3);
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }

  .panel.collapsed .panel-chevron {
    transform: rotate(-90deg);
  }

  .panel-body {
    padding: 0 18px 16px;
    transition: max-height 0.25s ease, opacity 0.2s ease, padding 0.25s ease;
    max-height: 600px;
    opacity: 1;
    overflow: hidden;
  }

  .panel.collapsed .panel-body {
    max-height: 0;
    opacity: 0;
    padding-top: 0;
    padding-bottom: 0;
  }

  /* ── Layer control panel ─────────────────────────────── */
  #controls {
    top: 16px;
    left: 16px;
    min-width: 210px;
  }

  .layer-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s;
  }

  .layer-toggle:hover { opacity: 0.85; }

  .layer-toggle input[type="checkbox"] {
    appearance: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.25);
    border-radius: 4px;
    flex-shrink: 0;
    position: relative;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .layer-toggle input[type="checkbox"]:checked {
    border-color: var(--layer-color);
    background: var(--layer-color);
  }

  .layer-toggle input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    top: 1px;
    left: 4px;
    width: 4px;
    height: 8px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .layer-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .layer-label {
    font-size: 14px;
    font-weight: 500;
    color: #e8e4df;
  }

  .layer-count {
    margin-left: auto;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.35);
    font-variant-numeric: tabular-nums;
  }

  /* ── Date range filter ───────────────────────────────── */
  .date-filter {
    padding: 4px 0 8px 26px;
    display: none;
  }

  .date-filter.active { display: block; }

  .date-filter-label {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.45);
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
  }

  .date-filter-label span {
    color: rgba(255, 255, 255, 0.7);
    font-weight: 600;
    display: inline-block;
    min-width: 5.5em;
    text-align: center;
  }

  .date-filter-count {
    color: rgba(255, 255, 255, 0.35) !important;
    font-weight: 500 !important;
    min-width: 4.5em !important;
    text-align: right !important;
  }

  .dual-range {
    position: relative;
    height: 20px;
    width: 100%;
  }

  .dual-range input[type="range"] {
    position: absolute;
    width: 100%;
    top: 0;
    height: 20px;
    margin: 0;
    padding: 0;
    appearance: none;
    background: transparent;
    pointer-events: none;
    z-index: 2;
  }

  .dual-range input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--layer-color, #fff);
    border: 2px solid #fff;
    cursor: pointer;
    pointer-events: auto;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .dual-range input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--layer-color, #fff);
    border: 2px solid #fff;
    cursor: pointer;
    pointer-events: auto;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .dual-range-track {
    position: absolute;
    top: 8px;
    left: 0;
    right: 0;
    height: 4px;
    border-radius: 2px;
    background: rgba(255, 255, 255, 0.1);
  }

  .dual-range-fill {
    position: absolute;
    top: 0;
    height: 100%;
    border-radius: 2px;
    background: var(--layer-color, rgba(255, 255, 255, 0.4));
    opacity: 0.5;
    cursor: grab;
    z-index: 1;
  }

  .dual-range-fill.dragging {
    cursor: grabbing;
    opacity: 0.7;
  }

  /* ── Route panel ─────────────────────────────────────── */
  #route-panel {
    top: 16px;
    right: 60px;
    min-width: 240px;
    max-width: 280px;
  }

  .route-step {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
  }

  .route-step-marker {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    color: #fff;
  }

  .route-step-marker.start { background: #3b82f6; }
  .route-step-marker.end   { background: #8b5cf6; }

  .route-step-text {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.6);
    line-height: 1.3;
  }

  .route-step-text.set {
    color: #e8e4df;
    font-weight: 500;
  }

  .route-connector {
    width: 24px;
    display: flex;
    justify-content: center;
    padding: 2px 0;
  }

  .route-connector-line {
    width: 2px;
    height: 16px;
    background: rgba(255, 255, 255, 0.12);
  }

  .route-info {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    display: none;
  }

  .route-info.visible { display: block; }

  .route-info-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    font-size: 13px;
  }

  .route-info-key {
    color: rgba(255, 255, 255, 0.45);
  }

  .route-info-val {
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .route-btn {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 8px 0;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 6px;
    color: rgba(255, 255, 255, 0.7);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .route-btn:hover { background: rgba(255, 255, 255, 0.14); color: #fff; }

  .route-hint {
    margin-top: 8px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.3);
    text-align: center;
    line-height: 1.4;
  }

  /* ── Mobile layout ───────────────────────────────────── */
  #panel-container {
    display: none;
  }

  @media (max-width: 640px) {
    #panel-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      z-index: 10;
      pointer-events: none;
    }

    #panel-container > .panel {
      position: relative;
      top: auto;
      left: auto;
      right: auto;
      min-width: 0;
      max-width: none;
      pointer-events: auto;
    }
  }

  /* ── Popup styling ───────────────────────────────────── */
  .maplibregl-popup-content {
    font-family: 'DM Sans', sans-serif;
    background: rgba(22, 22, 26, 0.96);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    padding: 14px 16px;
    color: #e8e4df;
    max-width: 300px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  }

  .maplibregl-popup-close-button {
    color: rgba(255, 255, 255, 0.5);
    font-size: 18px;
    right: 6px;
    top: 4px;
  }

  .maplibregl-popup-close-button:hover { color: #fff; }
  .maplibregl-popup-tip { border-top-color: rgba(22, 22, 26, 0.96); }

  .popup-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .popup-nav-btn {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 4px;
    color: rgba(255, 255, 255, 0.7);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    padding: 2px 8px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .popup-nav-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }
  .popup-nav-btn:disabled { opacity: 0.25; cursor: default; }

  .popup-nav-counter {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.4);
    font-variant-numeric: tabular-nums;
  }

  .popup-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }

  .popup-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 3px 0;
    font-size: 13px;
    line-height: 1.4;
  }

  .popup-key {
    color: rgba(255, 255, 255, 0.45);
    flex-shrink: 0;
  }

  .popup-val {
    text-align: right;
    font-weight: 500;
    word-break: break-word;
  }

  /* ── Loading indicator ───────────────────────────────── */
  .loading-bar {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(18, 18, 20, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.6);
    transition: opacity 0.3s;
  }

  .loading-bar.hidden { opacity: 0; pointer-events: none; }

  /* ── Custom cursor when placing route points ─────────── */
  .crosshair-cursor .maplibregl-canvas { cursor: crosshair !important; }

  /* ── Route markers ───────────────────────────────────── */
  .route-map-marker {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 3px solid #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    cursor: grab;
  }

  .route-map-marker.start { background: #3b82f6; }
  .route-map-marker.end   { background: #8b5cf6; }

  /* ── GitHub link ─────────────────────────────────────── */
  .github-link {
    position: absolute;
    bottom: 16px;
    left: 16px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(18, 18, 20, 0.75);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    padding: 6px 12px;
    color: rgba(255, 255, 255, 0.6);
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
    transition: color 0.2s, background 0.2s;
  }

  .github-link:hover {
    color: rgba(255, 255, 255, 0.9);
    background: rgba(18, 18, 20, 0.88);
  }

  .github-link svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }
</style>
</head>
<body>

<div id="map"></div>

<!-- Mobile: panels flow inside this container. Desktop: container is display:none, panels use absolute positioning. -->
<div id="panel-container"></div>

<div id="controls" class="panel">
  <div class="panel-header" data-panel="controls">
    <h2>Layers</h2>
    <svg class="panel-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4 6 8 10 12 6"/></svg>
  </div>
  <div class="panel-body" id="controls-body"></div>
</div>

<div id="route-panel" class="panel collapsed">
  <div class="panel-header" data-panel="route-panel">
    <h2>Route</h2>
    <svg class="panel-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4 6 8 10 12 6"/></svg>
  </div>
  <div class="panel-body">
    <div class="route-step">
      <div class="route-step-marker start">A</div>
      <div class="route-step-text" id="route-start-label">Click map to set start</div>
    </div>
    <div class="route-connector"><div class="route-connector-line"></div></div>
    <div class="route-step">
      <div class="route-step-marker end">B</div>
      <div class="route-step-text" id="route-end-label">Click map to set end</div>
    </div>
    <div class="route-info" id="route-info">
      <div class="route-info-row">
        <span class="route-info-key">Distance</span>
        <span class="route-info-val" id="route-distance">—</span>
      </div>
      <div class="route-info-row">
        <span class="route-info-key">Est. time</span>
        <span class="route-info-val" id="route-time">—</span>
      </div>
    </div>
    <button class="route-btn" id="route-clear-btn" style="display:none">Clear route</button>
    <div class="route-hint" id="route-hint">Click anywhere on the map to place start and end points</div>
  </div>
</div>

<a class="github-link" href="https://github.com/MattTriano/loci_platform" target="_blank" rel="noopener">
  <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.64 7.64 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
  Source
</a>

<div id="loading" class="loading-bar hidden">Loading…</div>

<script>
// ── Configuration ────────────────────────────────────────
const CONFIG = {
  log_endpoint: '',
  routing_api_url: '',
  routing_api_key: '',
};

fetch('config.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(cfg => { Object.assign(CONFIG, cfg); })
  .catch(() => { /* Use defaults */ });

// ── Panel accordion ──────────────────────────────────────
// On mobile, panels live inside #panel-container (flexbox column).
// On desktop, they stay as absolute-positioned elements on <body>.
function isMobile() { return window.innerWidth <= 640; }

const panelContainer = document.getElementById('panel-container');
const controlsPanel = document.getElementById('controls');
const routePanel = document.getElementById('route-panel');
let panelsInContainer = false;

function arrangePanels() {
  if (isMobile() && !panelsInContainer) {
    panelContainer.appendChild(controlsPanel);
    panelContainer.appendChild(routePanel);
    panelsInContainer = true;
  } else if (!isMobile() && panelsInContainer) {
    // Move panels back to body (before the loading bar)
    const loading = document.getElementById('loading');
    document.body.insertBefore(controlsPanel, loading);
    document.body.insertBefore(routePanel, loading);
    panelsInContainer = false;
  }
}

function togglePanel(panelId) {
  const panel = document.getElementById(panelId);
  const wasCollapsed = panel.classList.contains('collapsed');

  if (isMobile() && wasCollapsed) {
    // Collapse the other panel first
    document.querySelectorAll('.panel').forEach(p => {
      if (p.id !== panelId) p.classList.add('collapsed');
    });
  }

  panel.classList.toggle('collapsed');
}

document.querySelectorAll('.panel-header').forEach(header => {
  header.addEventListener('click', () => {
    togglePanel(header.dataset.panel);
  });
});

window.addEventListener('resize', arrangePanels);
arrangePanels();

// ── Layer configuration ──────────────────────────────────
const LAYERS = {
  crashes: {
    label: 'Bike Crashes',
    color: '#ef4444',
    file: 'data/crashes.geojson',
    clusterMaxZoom: 13,
    clusterRadius: 45,
    pointRadius: 5,
    defaultVisible: true,
    dateField: 'crash_date',
    popupTitle: 'Bike Crash',
    popupFields: [
      { key: 'crash_date',              label: 'Date' },
      { key: 'local_crash_time',        label: 'Time' },
      { key: 'local_crash_day_of_week', label: 'Day' },
      { key: 'street_direction',        label: 'Street', fmt: (v, p) => `${v || ''} ${p.street_name || ''}`.trim() },
      { key: 'first_crash_type',        label: 'Type' },
      { key: 'most_severe_injury',      label: 'Worst Injury' },
      { key: 'severity_score',          label: 'Severity' },
      { key: 'prim_contributory_cause', label: 'Cause' },
      { key: 'weather_condition',       label: 'Weather' },
      { key: 'lighting_condition',      label: 'Lighting' },
      { key: 'hit_and_run_i',           label: 'Hit & Run', fmt: v => v === 'Y' ? 'Yes' : v === 'N' ? 'No' : null },
      { key: 'dooring_i',              label: 'Dooring',   fmt: v => v === 'Y' ? 'Yes' : v === 'N' ? 'No' : null },
    ],
  },
  thefts: {
    label: 'Bike Thefts',
    color: '#f59e0b',
    file: 'data/thefts.geojson',
    clusterMaxZoom: 13,
    clusterRadius: 45,
    pointRadius: 5,
    defaultVisible: true,
    dateField: 'theft_date',
    popupTitle: 'Bike Theft',
    popupFields: [
      { key: 'source',               label: 'Source' },
      { key: 'theft_date',           label: 'Date' },
      { key: 'theft_hour',           label: 'Hour', fmt: v => v != null ? `${v}:00` : null },
      { key: 'location_description', label: 'Location' },
      { key: 'bike_description',     label: 'Bike' },
      { key: 'theft_description',    label: 'Details' },
      { key: 'locking_description',  label: 'Locking' },
    ],
  },
  parking: {
    label: 'Bike Parking',
    color: '#22c55e',
    file: 'data/parking.geojson',
    clusterMaxZoom: 13,
    clusterRadius: 40,
    pointRadius: 5,
    defaultVisible: true,
    popupTitle: 'Bike Parking',
    popupFields: [
      { key: 'name',     label: 'Name' },
      { key: 'type',     label: 'Type' },
      { key: 'capacity', label: 'Capacity' },
      { key: 'covered',  label: 'Covered',  fmt: v => v === true || v === 'yes' ? 'Yes' : v === false || v === 'no' ? 'No' : null },
      { key: 'indoor',   label: 'Indoor',   fmt: v => v === true || v === 'yes' ? 'Yes' : v === false || v === 'no' ? 'No' : null },
      { key: 'lit',      label: 'Lit',      fmt: v => v === true || v === 'yes' ? 'Yes' : v === false || v === 'no' ? 'No' : null },
      { key: 'fee',      label: 'Fee',      fmt: v => v === true || v === 'yes' ? 'Yes' : v === false || v === 'no' ? 'No' : null },
      { key: 'operator', label: 'Operator' },
      { key: 'access',   label: 'Access' },
    ],
  },
};

// ── State ────────────────────────────────────────────────
const layerData = {};
const layerCounts = {};
let currentPopup = null;
let popupFeatures = [];
let popupIndex = 0;

let routeOrigin = null;
let routeDestination = null;
let routeData = null;
let originMarker = null;
let destMarker = null;

// ── Map ──────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  center: [-87.6298, 41.8781],
  zoom: 11,
  minZoom: 9,
  maxZoom: 19,
  attributionControl: true,
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');
map.addControl(new maplibregl.GeolocateControl({
  positionOptions: { enableHighAccuracy: true },
  trackUserLocation: true,
}), 'top-right');

// ── Build layer control panel ────────────────────────────
const controlsBody = document.getElementById('controls-body');

for (const [id, cfg] of Object.entries(LAYERS)) {
  const label = document.createElement('label');
  label.className = 'layer-toggle';
  label.style.setProperty('--layer-color', cfg.color);
  label.innerHTML = `
    <input type="checkbox" ${cfg.defaultVisible ? 'checked' : ''} data-layer="${id}" />
    <span class="layer-swatch" style="background:${cfg.color}"></span>
    <span class="layer-label">${cfg.label}</span>
    <span class="layer-count" id="count-${id}"></span>
  `;
  controlsBody.appendChild(label);

  label.querySelector('input').addEventListener('change', (e) => {
    toggleLayer(id, e.target.checked);
  });

  // Add date filter slider for layers with a dateField
  if (cfg.dateField) {
    const filterDiv = document.createElement('div');
    filterDiv.className = 'date-filter';
    filterDiv.id = `date-filter-${id}`;
    filterDiv.style.setProperty('--layer-color', cfg.color);
    filterDiv.innerHTML = `
      <div class="date-filter-label" id="date-label-${id}">Loading dates…</div>
      <div class="dual-range">
        <div class="dual-range-track"><div class="dual-range-fill" id="date-fill-${id}"></div></div>
        <input type="range" id="date-min-${id}" min="0" max="1" value="0" />
        <input type="range" id="date-max-${id}" min="0" max="1" value="1" />
      </div>
    `;
    controlsBody.appendChild(filterDiv);
  }
}

// ── Date filter state ────────────────────────────────────
// Stores per-layer: { dates: [sorted unique date strings], minIdx, maxIdx }
const dateFilterState = {};

function parseDate(val) {
  // Extract YYYY-MM-DD from "2018-10-20 13:40:00+00:00" or similar
  if (!val) return null;
  return String(val).slice(0, 10);
}

function formatDateShort(dateStr) {
  // "2018-10-20" → "Oct 2018"
  const [y, m] = dateStr.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m, 10) - 1]} ${y}`;
}

function initDateFilter(id) {
  const cfg = LAYERS[id];
  if (!cfg.dateField || !layerData[id]) return;

  const features = layerData[id].features || [];
  const dateSet = new Set();

  // Precompute parsed date for each feature (avoids repeated string slicing)
  const featureDates = new Array(features.length);
  for (let i = 0; i < features.length; i++) {
    const d = parseDate(features[i].properties[cfg.dateField]);
    featureDates[i] = d;
    if (d) dateSet.add(d);
  }

  const dates = Array.from(dateSet).sort();
  if (dates.length < 2) return;

  const state = { dates, featureDates, minIdx: 0, maxIdx: dates.length - 1 };
  dateFilterState[id] = state;

  const minInput = document.getElementById(`date-min-${id}`);
  const maxInput = document.getElementById(`date-max-${id}`);
  const last = dates.length - 1;

  minInput.min = 0; minInput.max = last; minInput.value = 0;
  maxInput.min = 0; maxInput.max = last; maxInput.value = last;

  updateDateLabel(id);

  // Show the filter
  document.getElementById(`date-filter-${id}`).classList.add('active');

  let filterRAF = null;
  function scheduleFilter() {
    cancelAnimationFrame(filterRAF);
    filterRAF = requestAnimationFrame(() => applyDateFilter(id));
  }

  function onSliderInput() {
    let lo = parseInt(minInput.value);
    let hi = parseInt(maxInput.value);

    // Prevent handles from crossing
    if (lo > hi) {
      if (this === minInput) { lo = hi; minInput.value = lo; }
      else { hi = lo; maxInput.value = hi; }
    }

    state.minIdx = lo;
    state.maxIdx = hi;
    updateDateLabel(id);
    updateDateFill(id);
    scheduleFilter();
  }

  minInput.addEventListener('input', onSliderInput);
  maxInput.addEventListener('input', onSliderInput);
  updateDateFill(id);

  // Drag the fill bar to shift both handles together
  const fill = document.getElementById(`date-fill-${id}`);
  let dragStartX = null;
  let dragStartMin = null;
  let dragStartMax = null;

  fill.addEventListener('mousedown', startDrag);
  fill.addEventListener('touchstart', startDrag, { passive: false });

  function startDrag(e) {
    e.preventDefault();
    dragStartX = (e.touches ? e.touches[0] : e).clientX;
    dragStartMin = state.minIdx;
    dragStartMax = state.maxIdx;
    fill.classList.add('dragging');

    document.addEventListener('mousemove', onDrag);
    document.addEventListener('touchmove', onDrag, { passive: false });
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);
  }

  function onDrag(e) {
    e.preventDefault();
    const clientX = (e.touches ? e.touches[0] : e).clientX;
    const track = fill.parentElement;
    const pxPerStep = track.offsetWidth / last;
    const deltaSteps = Math.round((clientX - dragStartX) / pxPerStep);

    const span = dragStartMax - dragStartMin;
    let newMin = dragStartMin + deltaSteps;
    let newMax = dragStartMax + deltaSteps;

    // Clamp to bounds
    if (newMin < 0) { newMin = 0; newMax = span; }
    if (newMax > last) { newMax = last; newMin = last - span; }

    state.minIdx = newMin;
    state.maxIdx = newMax;
    minInput.value = newMin;
    maxInput.value = newMax;

    updateDateLabel(id);
    updateDateFill(id);
    scheduleFilter();
  }

  function stopDrag() {
    fill.classList.remove('dragging');
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
    document.removeEventListener('touchend', stopDrag);
  }
}

function updateDateLabel(id) {
  const state = dateFilterState[id];
  if (!state) return;
  const fromStr = formatDateShort(state.dates[state.minIdx]);
  const toStr = formatDateShort(state.dates[state.maxIdx]);
  const total = layerData[id].features.length;
  const filtered = countFilteredFeatures(id);
  document.getElementById(`date-label-${id}`).innerHTML =
    `<span>${fromStr}</span> — <span>${toStr}</span> <span class="date-filter-count">(${filtered.toLocaleString()})</span>`;
}

function updateDateFill(id) {
  const state = dateFilterState[id];
  if (!state) return;
  const fill = document.getElementById(`date-fill-${id}`);
  const range = state.dates.length - 1;
  const left = (state.minIdx / range) * 100;
  const right = (state.maxIdx / range) * 100;
  fill.style.left = left + '%';
  fill.style.width = (right - left) + '%';
}

function countFilteredFeatures(id) {
  const state = dateFilterState[id];
  if (!state || !layerData[id]) return 0;
  const minDate = state.dates[state.minIdx];
  const maxDate = state.dates[state.maxIdx];
  const fd = state.featureDates;
  let count = 0;
  for (let i = 0; i < fd.length; i++) {
    const d = fd[i];
    if (d && d >= minDate && d <= maxDate) count++;
  }
  return count;
}

function applyDateFilter(id) {
  const state = dateFilterState[id];
  const sourceId = `src-${id}`;
  if (!state || !map.getSource(sourceId)) return;

  const minDate = state.dates[state.minIdx];
  const maxDate = state.dates[state.maxIdx];
  const features = layerData[id].features;
  const fd = state.featureDates;
  const out = [];

  for (let i = 0; i < features.length; i++) {
    const d = fd[i];
    if (d && d >= minDate && d <= maxDate) out.push(features[i]);
  }

  map.getSource(sourceId).setData({ type: 'FeatureCollection', features: out });

  // Update the count display
  const countEl = document.getElementById(`count-${id}`);
  if (countEl) countEl.textContent = out.length.toLocaleString();
}

// ── Map load ─────────────────────────────────────────────
map.on('load', () => {
  map.addSource('route', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: [] },
  });

  map.addLayer({
    id: 'route-casing',
    type: 'line',
    source: 'route',
    layout: { 'line-join': 'round', 'line-cap': 'round' },
    paint: {
      'line-color': 'rgba(0, 0, 0, 0.4)',
      'line-width': 8,
    },
  });

  map.addLayer({
    id: 'route-line',
    type: 'line',
    source: 'route',
    layout: { 'line-join': 'round', 'line-cap': 'round' },
    paint: {
      'line-color': '#6366f1',
      'line-width': 5,
    },
  });

  for (const [id, cfg] of Object.entries(LAYERS)) {
    if (cfg.defaultVisible) {
      loadLayer(id);
    }
  }

  map.getContainer().classList.add('crosshair-cursor');
});

// ── Route: click-to-place ────────────────────────────────
map.on('click', (e) => {
  const pointLayers = Object.keys(LAYERS)
    .flatMap(id => [`${id}-clusters`, `${id}-points-hitarea`])
    .filter(lid => map.getLayer(lid));
  const hitFeatures = map.queryRenderedFeatures(e.point, { layers: pointLayers });
  if (hitFeatures.length > 0) return;

  const lngLat = [e.lngLat.lng, e.lngLat.lat];

  if (!routeOrigin) {
    setOrigin(lngLat);
  } else if (!routeDestination) {
    setDestination(lngLat);
    fetchRoute();
  }
});

function setOrigin(lngLat) {
  routeOrigin = lngLat;

  // Auto-expand route panel when user starts placing points
  const routePanel = document.getElementById('route-panel');
  if (routePanel.classList.contains('collapsed')) {
    togglePanel('route-panel');
  }

  if (originMarker) originMarker.remove();
  const el = document.createElement('div');
  el.className = 'route-map-marker start';
  el.textContent = 'A';
  originMarker = new maplibregl.Marker({ element: el, draggable: true })
    .setLngLat(lngLat)
    .addTo(map);

  originMarker.on('dragend', () => {
    const pos = originMarker.getLngLat();
    routeOrigin = [pos.lng, pos.lat];
    updateRouteLabel('start', routeOrigin);
    if (routeDestination) fetchRoute();
  });

  updateRouteLabel('start', lngLat);
  document.getElementById('route-hint').textContent = 'Now click to set your destination';
}

function setDestination(lngLat) {
  routeDestination = lngLat;

  if (destMarker) destMarker.remove();
  const el = document.createElement('div');
  el.className = 'route-map-marker end';
  el.textContent = 'B';
  destMarker = new maplibregl.Marker({ element: el, draggable: true })
    .setLngLat(lngLat)
    .addTo(map);

  destMarker.on('dragend', () => {
    const pos = destMarker.getLngLat();
    routeDestination = [pos.lng, pos.lat];
    updateRouteLabel('end', routeDestination);
    if (routeOrigin) fetchRoute();
  });

  updateRouteLabel('end', lngLat);
  document.getElementById('route-hint').style.display = 'none';
  document.getElementById('route-clear-btn').style.display = 'block';

  map.getContainer().classList.remove('crosshair-cursor');
}

function updateRouteLabel(which, lngLat) {
  const labelEl = document.getElementById(which === 'start' ? 'route-start-label' : 'route-end-label');
  labelEl.textContent = `${lngLat[1].toFixed(4)}, ${lngLat[0].toFixed(4)}`;
  labelEl.classList.add('set');
}

// ── Route: fetch from Lambda ─────────────────────────────
async function fetchRoute() {
  if (!CONFIG.routing_api_url) {
    console.warn('No routing_api_url configured');
    return;
  }

  const loadingEl = document.getElementById('loading');
  loadingEl.textContent = 'Finding route (first route request may take ~15s as lambda func spins up)';
  loadingEl.classList.remove('hidden');

  try {
    const resp = await fetch(CONFIG.routing_api_url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Api-Key': CONFIG.routing_api_key,
      },
      body: JSON.stringify({
        origin: [routeOrigin[1], routeOrigin[0]],           // [lat, lon]
        destination: [routeDestination[1], routeDestination[0]], // [lat, lon]
      }),
    });

    if (!resp.ok) {
      const errBody = await resp.json().catch(() => ({}));
      throw new Error(errBody.error || `API returned ${resp.status}`);
    }

    const data = await resp.json();
    routeData = data;

    // Draw route on map — coordinates are already [lon, lat]
    map.getSource('route').setData({
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates: data.coordinates,
      },
    });

    // Fit map to route bounds
    const bounds = data.coordinates.reduce(
      (b, c) => b.extend(c),
      new maplibregl.LngLatBounds(data.coordinates[0], data.coordinates[0])
    );
    map.fitBounds(bounds, { padding: 80 });

    // Show route info
    const distKm = data.total_length_m / 1000;
    const distMi = distKm * 0.621371;
    // Rough estimate: ~15 km/h average city cycling speed
    const durMin = Math.round((data.total_length_m / 1000) / 15 * 60);

    document.getElementById('route-distance').textContent = `${distMi.toFixed(1)} mi (${distKm.toFixed(1)} km)`;
    document.getElementById('route-time').textContent = `~${durMin} min`;
    document.getElementById('route-info').classList.add('visible');

    logRouteRequest(data);

  } catch (err) {
    console.error('Routing failed:', err);
    loadingEl.textContent = `Routing failed: ${err.message}`;
    setTimeout(() => loadingEl.classList.add('hidden'), 3000);
    return;
  }

  loadingEl.classList.add('hidden');
}

// ── Route: clear ─────────────────────────────────────────
document.getElementById('route-clear-btn').addEventListener('click', clearRoute);

function clearRoute() {
  routeOrigin = null;
  routeDestination = null;
  routeData = null;

  if (originMarker) { originMarker.remove(); originMarker = null; }
  if (destMarker) { destMarker.remove(); destMarker = null; }

  if (map.getSource('route')) {
    map.getSource('route').setData({ type: 'FeatureCollection', features: [] });
  }

  const startLabel = document.getElementById('route-start-label');
  const endLabel = document.getElementById('route-end-label');
  startLabel.textContent = 'Click map to set start';
  startLabel.classList.remove('set');
  endLabel.textContent = 'Click map to set end';
  endLabel.classList.remove('set');
  document.getElementById('route-info').classList.remove('visible');
  document.getElementById('route-clear-btn').style.display = 'none';
  document.getElementById('route-hint').style.display = '';
  document.getElementById('route-hint').textContent = 'Click anywhere on the map to place start and end points';

  map.getContainer().classList.add('crosshair-cursor');
}

// ── Route: log to API Gateway ────────────────────────────
function logRouteRequest(data) {
  if (!CONFIG.log_endpoint) return;

  const payload = {
    timestamp: new Date().toISOString(),
    origin: { lng: routeOrigin[0], lat: routeOrigin[1] },
    destination: { lng: routeDestination[0], lat: routeDestination[1] },
    total_length_m: data.total_length_m,
    total_cost: data.total_cost,
    route_geometry: { type: 'LineString', coordinates: data.coordinates },
    user_agent: navigator.userAgent,
    screen: { width: screen.width, height: screen.height },
    viewport: { width: window.innerWidth, height: window.innerHeight },
    referrer: document.referrer || null,
    active_layers: Object.keys(LAYERS).filter(id => {
      const cb = document.querySelector(`input[data-layer="${id}"]`);
      return cb && cb.checked;
    }),
  };

  fetch(CONFIG.log_endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
    keepalive: true,
  }).catch(() => {});
}

// ── Layer loading ────────────────────────────────────────
async function loadLayer(id) {
  if (layerData[id]) {
    showLayer(id);
    return;
  }

  const cfg = LAYERS[id];
  const loadingEl = document.getElementById('loading');
  loadingEl.textContent = `Loading ${cfg.label}…`;
  loadingEl.classList.remove('hidden');

  try {
    const resp = await fetch(cfg.file);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const geojson = await resp.json();
    layerData[id] = geojson;
    layerCounts[id] = geojson.features ? geojson.features.length : 0;

    const countEl = document.getElementById(`count-${id}`);
    if (countEl) countEl.textContent = layerCounts[id].toLocaleString();

    addLayerToMap(id);
    initDateFilter(id);
  } catch (err) {
    console.error(`Failed to load ${cfg.file}:`, err);
    loadingEl.textContent = `Failed to load ${cfg.label}`;
    setTimeout(() => loadingEl.classList.add('hidden'), 2000);
    return;
  }

  loadingEl.classList.add('hidden');
}

// ── Add source + layers to the map ───────────────────────
function addLayerToMap(id) {
  const cfg = LAYERS[id];
  const sourceId = `src-${id}`;

  map.addSource(sourceId, {
    type: 'geojson',
    data: layerData[id],
    cluster: true,
    clusterMaxZoom: cfg.clusterMaxZoom,
    clusterRadius: cfg.clusterRadius,
  });

  map.addLayer({
    id: `${id}-clusters`,
    type: 'circle',
    source: sourceId,
    filter: ['has', 'point_count'],
    paint: {
      'circle-color': cfg.color,
      'circle-opacity': 0.75,
      'circle-radius': [
        'step', ['get', 'point_count'],
        14,
        10, 18,
        100, 24,
        1000, 32,
      ],
    },
  });

  map.addLayer({
    id: `${id}-cluster-count`,
    type: 'symbol',
    source: sourceId,
    filter: ['has', 'point_count'],
    layout: {
      'text-field': '{point_count_abbreviated}',
      'text-size': 12,
    },
    paint: {
      'text-color': '#ffffff',
    },
  });

  // Invisible hit-area layer (larger radius for easier tapping)
  map.addLayer({
    id: `${id}-points-hitarea`,
    type: 'circle',
    source: sourceId,
    filter: ['!', ['has', 'point_count']],
    paint: {
      'circle-color': 'transparent',
      'circle-radius': 16,
    },
  });

  // Visible points (drawn on top of hit area)
  map.addLayer({
    id: `${id}-points`,
    type: 'circle',
    source: sourceId,
    filter: ['!', ['has', 'point_count']],
    paint: {
      'circle-color': cfg.color,
      'circle-radius': cfg.pointRadius,
      'circle-stroke-width': 1.5,
      'circle-stroke-color': 'rgba(255,255,255,0.6)',
      'circle-opacity': 0.85,
    },
  });

  map.on('click', `${id}-clusters`, (e) => {
    const features = map.queryRenderedFeatures(e.point, { layers: [`${id}-clusters`] });
    const clusterId = features[0].properties.cluster_id;
    map.getSource(sourceId).getClusterExpansionZoom(clusterId, (err, zoom) => {
      if (err) return;
      map.easeTo({ center: features[0].geometry.coordinates, zoom: zoom });
    });
  });

  map.on('click', `${id}-points-hitarea`, (e) => {
    const allHitLayers = Object.keys(LAYERS)
      .map(lid => `${lid}-points-hitarea`)
      .filter(lid => map.getLayer(lid) && map.getLayoutProperty(lid, 'visibility') !== 'none');

    const allFeatures = map.queryRenderedFeatures(e.point, { layers: allHitLayers });
    if (!allFeatures.length) return;

    popupFeatures = allFeatures.map(feat => {
      const layerId = feat.layer.id.replace('-points-hitarea', '');
      const featCfg = LAYERS[layerId];
      const coords = feat.geometry.coordinates.slice();
      while (Math.abs(e.lngLat.lng - coords[0]) > 180) {
        coords[0] += e.lngLat.lng > coords[0] ? 360 : -360;
      }
      return { cfg: featCfg, props: feat.properties, coords };
    });
    popupIndex = 0;

    showPopupAtIndex(popupFeatures[0].coords);
  });

  map.on('mouseenter', `${id}-clusters`, () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', `${id}-clusters`, () => { map.getCanvas().style.cursor = ''; });
  map.on('mouseenter', `${id}-points-hitarea`, () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', `${id}-points-hitarea`, () => { map.getCanvas().style.cursor = ''; });
}

// ── Popup display with pagination ────────────────────────
function showPopupAtIndex(coords) {
  const entry = popupFeatures[popupIndex];
  const html = buildPopupHTML(entry.cfg, entry.props, popupFeatures.length, popupIndex);

  if (currentPopup) currentPopup.remove();
  currentPopup = new maplibregl.Popup({ offset: 8, maxWidth: '320px' })
    .setLngLat(coords)
    .setHTML(html)
    .addTo(map);

  const prevBtn = document.getElementById('popup-prev');
  const nextBtn = document.getElementById('popup-next');
  if (prevBtn) prevBtn.addEventListener('click', (evt) => {
    evt.stopPropagation();
    popupIndex = Math.max(0, popupIndex - 1);
    showPopupAtIndex(coords);
  });
  if (nextBtn) nextBtn.addEventListener('click', (evt) => {
    evt.stopPropagation();
    popupIndex = Math.min(popupFeatures.length - 1, popupIndex + 1);
    showPopupAtIndex(coords);
  });
}

function buildPopupHTML(cfg, props, totalCount, currentIndex) {
  let nav = '';
  if (totalCount > 1) {
    nav = `<div class="popup-nav">
      <button class="popup-nav-btn" id="popup-prev" ${currentIndex === 0 ? 'disabled' : ''}>&lsaquo; Prev</button>
      <span class="popup-nav-counter">${currentIndex + 1} of ${totalCount}</span>
      <button class="popup-nav-btn" id="popup-next" ${currentIndex === totalCount - 1 ? 'disabled' : ''}>Next &rsaquo;</button>
    </div>`;
  }

  let rows = '';
  for (const f of cfg.popupFields) {
    let val;
    if (f.fmt) {
      val = f.fmt(props[f.key], props);
    } else {
      val = props[f.key];
    }
    if (val == null || val === '' || val === 'null') continue;
    rows += `<div class="popup-row"><span class="popup-key">${f.label}</span><span class="popup-val">${escHtml(String(val))}</span></div>`;
  }
  return `${nav}<div class="popup-title" style="color:${cfg.color}">${cfg.popupTitle}</div>${rows}`;
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Toggle visibility ────────────────────────────────────
function toggleLayer(id, visible) {
  if (visible) {
    loadLayer(id);
  } else {
    hideLayer(id);
  }
}

function showLayer(id) {
  const ids = [`${id}-clusters`, `${id}-cluster-count`, `${id}-points-hitarea`, `${id}-points`];
  for (const lid of ids) {
    if (map.getLayer(lid)) map.setLayoutProperty(lid, 'visibility', 'visible');
  }
}

function hideLayer(id) {
  const ids = [`${id}-clusters`, `${id}-cluster-count`, `${id}-points-hitarea`, `${id}-points`];
  for (const lid of ids) {
    if (map.getLayer(lid)) map.setLayoutProperty(lid, 'visibility', 'none');
  }
  if (currentPopup) { currentPopup.remove(); currentPopup = null; }
}
